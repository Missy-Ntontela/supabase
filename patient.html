<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health-Flow | Patient</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 24px;
            color: #1e3c72;
        }
        .shell {
            max-width: 960px;
            margin: 0 auto;
            display: none;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-radius: 16px;
            padding: 16px 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin-bottom: 24px;
        }
        .brand { font-weight: 700; font-size: 18px; }
        .logout {
            background: #f5f5f5;
            border: none;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            color: #333;
            transition: background 0.2s;
        }
        .logout:hover { background: #e0e0e0; }
        .welcome-card {
            background: white;
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin-bottom: 24px;
        }
        .welcome-card h1 {
            font-size: 28px;
            margin-bottom: 6px;
        }
        .welcome-card p { color: #666; font-size: 15px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }
        .tile {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .tile:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 36px rgba(0,0,0,0.18);
        }
        .tile h3 { font-size: 16px; margin-bottom: 4px; }
        .tile p { color: #666; font-size: 13px; }
        .tile .icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="shell" id="shell">
        <div class="topbar">
            <div class="brand">Health-Flow</div>
            <button class="logout" id="logoutBtn">Sign out</button>
        </div>

        <div class="welcome-card">
            <h1>Welcome, <span id="userName">...</span></h1>
            <p>Manage your appointments and profile from one place.</p>
        </div>

        <div class="grid">
            <div class="tile">
                <div class="icon">B</div>
                <h3>Book appointment</h3>
                <p>Schedule your next clinic visit</p>
            </div>
            <div class="tile">
                <div class="icon">A</div>
                <h3>My appointments</h3>
                <p>View upcoming and past visits</p>
            </div>
            <div class="tile">
                <div class="icon">P</div>
                <h3>My profile</h3>
                <p>Update your personal details</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
    async function init() {
        await protectPage('patient');
        const row = await getCurrentUserRow();
        if (!row) return;

        const name = (row.full_name || '').split(' ')[0] || row.email;
        document.getElementById('userName').textContent = name;
        document.getElementById('shell').style.display = 'block';
    }

    document.getElementById('logoutBtn').addEventListener('click', logout);
    init();
    </script>
</body>
</html>
