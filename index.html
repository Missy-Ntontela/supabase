<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Auth System</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .box {
      background: white;
      padding: 25px;
      border-radius: 15px;
      width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 { text-align: center; }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #667eea;
      color: white;
      cursor: pointer;
    }

    .google-btn {
      background: #db4437;
    }

    .toggle {
      text-align: center;
      margin-top: 10px;
      cursor: pointer;
      color: #667eea;
    }

    .msg {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="box" id="authBox" style="display:none;">

  <h2 id="title">Login</h2>

  <form autocomplete="off">

    <input 
      id="email"
      type="email"
      name="username"
      placeholder="Email"
      autocomplete="username"
    >

    <input 
      id="password"
      type="password"
      name="password"
      placeholder="Password"
      autocomplete="current-password"
    >

  </form>

  <button onclick="handleAuth()" id="btn">Login</button>

  <button onclick="googleLogin()" class="google-btn">
    Google Login
  </button>

  <div class="toggle" onclick="toggleMode()">
    Don't have an account? Sign up
  </div>

  <div class="msg" id="msg"></div>
</div>

<script src="app.js"></script>
<script>
  routeIfAuthenticated().then((authed) => {
    if (!authed) document.getElementById("authBox").style.display = "block";
  });
</script>

</body>
</html>
