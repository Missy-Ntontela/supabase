<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health-Flow | Complete Your Profile</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: none;
        }
        h1 { font-size: 24px; color: #1e3c72; margin-bottom: 8px; text-align: center; }
        .subtitle { color: #666; font-size: 14px; text-align: center; margin-bottom: 28px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: #667eea; }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transition: all 0.2s;
        }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,0.4); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        .message.error { background: #fee; color: #c33; border: 1px solid #fcc; display: block; }
        .logout-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #999;
            font-size: 13px;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container" id="appRoot">
        <h1>Complete your profile</h1>
        <p class="subtitle">We need a couple more details before you continue.</p>

        <div class="form-group">
            <label>Full name</label>
            <input type="text" id="fullName" placeholder="Jane Doe">
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="tel" id="phone" placeholder="+27 ...">
        </div>

        <button id="saveBtn">Save and continue</button>

        <a class="logout-link" id="logoutLink">Sign out</a>

        <div id="message" class="message"></div>
    </div>

    <script src="app.js"></script>
    <script>
    const appRoot = document.getElementById('appRoot');
    const fullNameInput = document.getElementById('fullName');
    const phoneInput = document.getElementById('phone');
    const saveBtn = document.getElementById('saveBtn');
    const messageDiv = document.getElementById('message');

    function showError(text) {
        messageDiv.textContent = text;
        messageDiv.className = 'message error';
    }

    async function init() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) { window.location.href = 'index.html'; return; }

        const row = await getCurrentUserRow();
        if (row && !needsOnboarding(row)) {
            window.location.href = pageForRole(row.role);
            return;
        }

        if (row?.full_name) fullNameInput.value = row.full_name;
        if (row?.phone) phoneInput.value = row.phone;

        appRoot.style.display = 'block';
    }

    async function save() {
        const full_name = fullNameInput.value.trim();
        const phone = phoneInput.value.trim();

        if (!full_name || !phone) return showError('Please fill in both fields');

        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving...';

        const { data: { user } } = await supabaseClient.auth.getUser();
        const { error } = await supabaseClient
            .from('users')
            .upsert({ id: user.id, email: user.email, full_name, phone }, { onConflict: 'id' });

        if (error) {
            showError(error.message);
            saveBtn.disabled = false;
            saveBtn.textContent = 'Save and continue';
            return;
        }

        await routeUser();
    }

    saveBtn.addEventListener('click', save);
    document.getElementById('logoutLink').addEventListener('click', logout);
    fullNameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') phoneInput.focus(); });
    phoneInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') save(); });

    init();
    </script>
</body>
</html>
