<!-- ================= ADMIN DASHBOARD ================= -->
<!-- admin.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body { font-family: Arial; margin:0; background:#f4f6f9; }
    header { background:#2c3e50; color:white; padding:15px; }
    .container { padding:20px; }
    .card { background:white; padding:20px; border-radius:10px; margin-bottom:15px; box-shadow:0 5px 15px rgba(0,0,0,0.1);}    
    button { padding:10px 15px; border:none; background:#e74c3c; color:white; border-radius:5px; cursor:pointer; }
  </style>
</head>
<body>
<header>
  <h2>Admin Dashboard</h2>
</header>
<div class="container">
  <div class="card">Manage Users (coming soon)</div>
  <div class="card">System Analytics (coming soon)</div>
  <button onclick="logout()">Logout</button>
</div>
<script src="app.js"></script>
<script>protectPage("admin");</script>
</body>
</html>
